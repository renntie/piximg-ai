<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PixImage - AI Photo Enhancer</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
/* =========================
   ULTRA MINIMAL STYLE
========================= */

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', sans-serif;
    background: #ffffff;
    color: #111;
    transition: 0.3s ease;
}

body.dark {
    background: #0f0f0f;
    color: #f1f1f1;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 40px 20px;
}

.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px;
}

.logo {
    font-weight: 600;
    font-size: 18px;
}

.top-controls {
    display: flex;
    gap: 10px;
    align-items: center;
}

select, .theme-toggle {
    padding: 6px 10px;
    border-radius: 8px;
    border: 1px solid #ddd;
    background: #fff;
    cursor: pointer;
}

body.dark select,
body.dark .theme-toggle {
    background: #1a1a1a;
    color: white;
    border: 1px solid #333;
}

.hero {
    text-align: center;
    padding: 60px 0;
}

.hero h1 {
    font-size: 36px;
    font-weight: 600;
    margin-bottom: 15px;
}

.hero p {
    opacity: 0.6;
    max-width: 500px;
    margin: auto;
}

.card {
    background: #ffffff;
    padding: 30px;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    margin-top: 40px;
}

body.dark .card {
    background: #1a1a1a;
    box-shadow: none;
}

.btn-primary {
    background: #111;
    color: white;
    border: none;
    padding: 12px 18px;
    border-radius: 10px;
    margin-top: 15px;
    cursor: pointer;
    width: 100%;
}

body.dark .btn-primary {
    background: #f1f1f1;
    color: #111;
}

input[type="file"],
select {
    width: 100%;
    margin-top: 10px;
}

.result img {
    width: 100%;
    margin-top: 15px;
    border-radius: 12px;
}

.hidden {
    display: none;
}
</style>
</head>
<body>

<div class="navbar container">
    <div class="logo">PixImage</div>
    <div class="top-controls">
        <select id="languageSwitcher">
            <option value="id">ID</option>
            <option value="en">EN</option>
        </select>
        <button id="themeToggle" class="theme-toggle">🌙</button>
    </div>
</div>

<div class="container">

    <div class="hero">
        <h1 id="heroTitle">Penjernih Foto AI</h1>
        <p id="heroDesc">Tingkatkan kualitas gambar Anda secara instan dengan teknologi AI.</p>
    </div>

    <div class="card">
        <form id="uploadForm">
            <input type="file" id="fileInput" accept="image/png, image/jpeg" required>

            <select id="scale">
                <option value="4">4x (Rekomendasi)</option>
                <option value="8">8x (Ultra HD)</option>
            </select>

            <button type="submit" class="btn-primary" id="submitBtn">
                Mulai Upscale
            </button>
        </form>

        <div id="result" class="result hidden">
            <h3 id="resultTitle">Hasil Upscale:</h3>
            <img id="resultImage">
            <a id="downloadBtn" class="btn-primary" download="piximage-hd.png">Download HD</a>
        </div>

        <p id="errorMsg" style="color:red; margin-top:10px;"></p>
    </div>

</div>

<script>
/* =========================
   DARK MODE
========================= */

const themeToggle = document.getElementById("themeToggle");

themeToggle.addEventListener("click", () => {
    document.body.classList.toggle("dark");

    if (document.body.classList.contains("dark")) {
        themeToggle.textContent = "☀️";
        localStorage.setItem("theme", "dark");
    } else {
        themeToggle.textContent = "🌙";
        localStorage.setItem("theme", "light");
    }
});

if (localStorage.getItem("theme") === "dark") {
    document.body.classList.add("dark");
    themeToggle.textContent = "☀️";
}

/* =========================
   LANGUAGE SWITCH
========================= */

const translations = {
    id: {
        heroTitle: "Penjernih Foto AI",
        heroDesc: "Tingkatkan kualitas gambar Anda secara instan dengan teknologi AI.",
        startBtn: "Mulai Upscale",
        resultTitle: "Hasil Upscale:",
        download: "Download HD"
    },
    en: {
        heroTitle: "AI Photo Enhancer",
        heroDesc: "Enhance your image quality instantly using AI technology.",
        startBtn: "Start Upscale",
        resultTitle: "Upscale Result:",
        download: "Download HD"
    }
};

const languageSwitcher = document.getElementById("languageSwitcher");

languageSwitcher.addEventListener("change", (e) => {
    const lang = e.target.value;
    const t = translations[lang];

    document.getElementById("heroTitle").innerText = t.heroTitle;
    document.getElementById("heroDesc").innerText = t.heroDesc;
    document.getElementById("submitBtn").innerText = t.startBtn;
    document.getElementById("resultTitle").innerText = t.resultTitle;
    document.getElementById("downloadBtn").innerText = t.download;

    localStorage.setItem("language", lang);
});

if (localStorage.getItem("language")) {
    languageSwitcher.value = localStorage.getItem("language");
    languageSwitcher.dispatchEvent(new Event("change"));
}

/* =========================
   BACKEND CONNECT
========================= */

const uploadForm = document.getElementById("uploadForm");
const fileInput = document.getElementById("fileInput");
const resultDiv = document.getElementById("result");
const resultImage = document.getElementById("resultImage");
const downloadBtn = document.getElementById("downloadBtn");
const errorMsg = document.getElementById("errorMsg");

uploadForm.addEventListener("submit", async (e) => {
    e.preventDefault();

    const file = fileInput.files[0];
    if (!file) return;

    const formData = new FormData();
    formData.append("image", file);
    formData.append("scale", document.getElementById("scale").value);

    try {
        const response = await fetch("/api/upscale", {
            method: "POST",
            body: formData
        });

        const data = await response.json();

        if (!data.success) {
            throw new Error(data.error);
        }

        resultImage.src = data.image;
        downloadBtn.href = data.image;
        resultDiv.classList.remove("hidden");
        errorMsg.textContent = "";

    } catch (error) {
        errorMsg.textContent = error.message;
    }
});
</script>

</body>
</html>
