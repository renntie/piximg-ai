<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixImage - Penjernih Foto AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar">
    <div class="container nav-container">
        <div class="logo-text">PixImage</div>
        <button class="btn-primary-sm trigger-upload-btn">Unggah</button>
    </div>
</header>

<main>
    <section class="hero-simple">
        <div class="container center-content">
            
            <h1>Penjernih Foto <span class="highlight-text">AI</span></h1>
            
            <p class="hero-desc">
                Tingkatkan kualitas, ketajaman, dan resolusi gambar Anda
                hanya dalam beberapa detik menggunakan teknologi AI.
            </p>

            <button class="btn btn-primary btn-lg trigger-upload-btn">
                Unggah Gambar Sekarang
            </button>

            <div class="before-after">
                <div class="img-box">
                    <span class="label">Before</span>
                    <img src="images/before.jpg" alt="Before">
                </div>
                <div class="img-box">
                    <span class="label">After</span>
                    <img src="images/after.jpg" alt="After">
                </div>
            </div>

        </div>
    </section>
</main>

<footer>
    <div class="container">
        <p>Dikembangkan oleh <strong>AMMAR ASHIM</strong></p>
        <p class="legal">
            Syarat & Ketentuan | Kebijakan Privasi
        </p>
    </div>
</footer>


<!-- UPLOAD MODAL (TETAP DIPERLUKAN UNTUK SCRIPT.JS) -->
<div id="uploadOverlay" class="upload-overlay hidden">
    <div class="upload-modal">
        <button id="closeOverlayBtn" class="close-btn">✕</button>
        <form id="uploadForm">
            <input type="file" name="image" id="fileInput" accept="image/jpeg, image/png, image/jpg" hidden>

            <div class="preview-area" id="previewArea" style="display:none;">
                <img id="imagePreview">
            </div>

            <div class="controls" id="controlsArea" style="display:none;">
                <label>Skala Pembesaran:</label>
                <select id="scale" name="scale">
                    <option value="4">4x (Rekomendasi)</option>
                    <option value="8">8x (Ultra HD)</option>
                </select>
                <button type="submit" id="submitBtn" class="btn btn-primary btn-block" style="margin-top:1rem;">
                    Mulai Upscale
                </button>
            </div>

            <div id="loading" class="loading hidden">
                <div class="spinner"></div>
                <p>Sedang memproses...</p>
            </div>

            <div id="result" class="result hidden">
                <h3>Hasil Upscale:</h3>
                <div class="result-img-wrapper">
                    <img id="resultImage">
                </div>
                <a id="downloadBtn" class="btn btn-success btn-block">Download HD</a>
                <button type="button" id="resetBtn" class="btn btn-text btn-block" style="margin-top:0.5rem;">
                    Coba Lagi
                </button>
            </div>

            <div id="errorMsg" class="error hidden"></div>
        </form>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
